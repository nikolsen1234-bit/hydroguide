name: PR Checks

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agent-prosedyre:
    name: Agent commit-prosedyre
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need full history so check-commit-msg can read recent commits.
          fetch-depth: 50

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Validate latest commit message
        if: github.event_name == 'push'
        run: |
          git log -1 --format=%B > .commit-msg-tmp
          node backend/scripts/check-commit-msg.mjs .commit-msg-tmp
          rm .commit-msg-tmp

      - name: Validate all PR commit messages
        if: github.event_name == 'pull_request'
        run: |
          set -e
          # Check every commit in the PR.
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          for sha in $(git rev-list "$base_sha..$head_sha"); do
            git log -1 --format=%B "$sha" > .commit-msg-tmp
            echo "Checking commit $sha"
            node backend/scripts/check-commit-msg.mjs .commit-msg-tmp
          done
          rm -f .commit-msg-tmp

      - name: Check for console.log/debug
        run: node backend/scripts/check-no-console.mjs --all

      - name: Check for hardcoded Cloudflare IDs
        run: node backend/scripts/check-hardcoded-ids.mjs --all

      - name: Check for postMessage wildcard origin
        run: node backend/scripts/check-postmessage.mjs --all

      - name: Check Worker config hygiene
        run: node backend/scripts/check-worker-hygiene.mjs --all --ci
