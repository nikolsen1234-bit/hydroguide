name: Cloudflare Workers Deploy

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/cloudflare-workers.yml"
      - "backend/api-worker/**"
      - "backend/config/cloudflare.public.json"
      - "backend/config/wrangler.jsonc"
      - "backend/scripts/build-cloudflare-worker-config.mjs"
      - "backend/services/ai/**"
      - "frontend/package-lock.json"
      - "frontend/package.json"
  workflow_dispatch:
    inputs:
      deploy_api_worker:
        description: "Deploy hydroguide-api"
        type: boolean
        default: true
      deploy_ai_worker:
        description: "Deploy hydroguide-w-r2"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Workers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      KV_API_KEYS_NAMESPACE_ID: ${{ secrets.KV_API_KEYS_NAMESPACE_ID }}
      KV_PROMPT_NAMESPACE_ID: ${{ secrets.KV_PROMPT_NAMESPACE_ID }}
      SECRETS_STORE_ID: ${{ secrets.SECRETS_STORE_ID }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build generated Cloudflare configs
        run: node ../backend/scripts/build-cloudflare-worker-config.mjs --deploy-preflight --check-public --write-deploy-config

      - name: Deploy hydroguide-api
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_api_worker }}
        run: npx wrangler deploy --config ../backend/api-worker/wrangler.generated.jsonc

      - name: Deploy hydroguide-w-r2
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_ai_worker }}
        run: npx wrangler deploy --config ../backend/config/wrangler.generated.jsonc
