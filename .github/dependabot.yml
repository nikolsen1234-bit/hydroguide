version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Oslo
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        dependency-type: production
      frontend-development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Europe/Oslo
    open-pull-requests-limit: 5
