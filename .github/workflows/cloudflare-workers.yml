name: Cloudflare Workers Deploy

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/cloudflare-workers.yml"
      - "backend/cloudflare/**"
      - "backend/config/cloudflare.public.json"
      - "backend/scripts/build-cloudflare-worker-config.mjs"
      - "backend/workers/**"
      - "backend/admin/**"
      - "backend/api/**"
      - "backend/services/ai/**"
      - "frontend/package-lock.json"
      - "frontend/package.json"
  workflow_dispatch:
    inputs:
      deploy_api_worker:
        description: "Deploy hydroguide-api"
        type: boolean
        default: true
      deploy_ai_worker:
        description: "Deploy hydroguide-ai"
        type: boolean
        default: true
      deploy_report_worker:
        description: "Deploy hydroguide-report"
        type: boolean
        default: true
      deploy_admin_worker:
        description: "Deploy hydroguide-admin"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Workers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      KV_API_KEYS_NAMESPACE_ID: ${{ secrets.KV_API_KEYS_NAMESPACE_ID }}
      KV_REPORT_RULES_NAMESPACE_ID: ${{ secrets.KV_REPORT_RULES_NAMESPACE_ID }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build generated Cloudflare configs
        run: node ../backend/scripts/build-cloudflare-worker-config.mjs --deploy-preflight --check-public --write-deploy-config

      - name: Deploy hydroguide-ai
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_ai_worker }}
        run: npx wrangler deploy --config ../backend/cloudflare/ai.generated.wrangler.jsonc

      - name: Deploy hydroguide-api
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_api_worker }}
        run: npx wrangler deploy --config ../backend/cloudflare/api.generated.wrangler.jsonc

      - name: Deploy hydroguide-report
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_report_worker }}
        run: npx wrangler deploy --config ../backend/cloudflare/report.generated.wrangler.jsonc

      - name: Deploy hydroguide-admin
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_admin_worker }}
        run: npx wrangler deploy --config ../backend/cloudflare/admin.generated.wrangler.jsonc
